<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#5f4b3b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="나의 서재" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>나의 서재 · iPhone ISBN 스캐너 v3</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{--bg:#f7f3ed;--panel:#fffdf9;--ink:#2d2925;--muted:#77706a;--line:#e7ddd1;--accent:#72533d;--accent2:#efe3d5;--danger:#a23b3b;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif} button,input,select,textarea{font:inherit}.app{max-width:720px;margin:auto;padding:calc(18px + var(--safe-top)) 16px calc(92px + var(--safe-bottom))}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}h1{margin:0;font-family:Georgia,serif;font-size:34px}.sub{font-size:13px;color:var(--muted);margin-top:4px}.count{background:var(--ink);color:#fff;border-radius:16px;padding:10px 15px;text-align:center}.count strong{display:block;font-size:22px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(70,48,31,.06);margin-bottom:14px}h2{font-size:18px;margin:0 0 12px}.hero{display:grid;gap:10px}.scan-button{width:100%;min-height:58px;border:0;border-radius:16px;background:var(--accent);color:#fff;font-weight:800;font-size:17px}.manual-row{display:flex;gap:8px}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px;color:var(--ink)}button{border:0;border-radius:13px;padding:12px 14px;font-weight:800}.primary{background:var(--accent);color:white}.secondary{background:var(--accent2);color:var(--accent)}.ghost{background:transparent;border:1px solid var(--line)}.danger{background:#faeded;color:var(--danger)}.hint,.status{color:var(--muted);font-size:13px;line-height:1.45;margin:8px 0 0}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}.toolbar select{grid-column:1/-1}.books{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.book{border:1px solid var(--line);background:white;border-radius:17px;padding:10px;display:flex;flex-direction:column;min-height:300px}.cover{width:100%;aspect-ratio:3/4;object-fit:cover;background:#eee6dc;border-radius:11px}.cover-placeholder{display:grid;place-items:center;text-align:center;padding:8px;color:var(--muted)}.book h3{font-size:15px;line-height:1.35;margin:9px 0 4px}.meta{font-size:12px;line-height:1.4;color:var(--muted)}.badge{display:inline-flex;width:max-content;margin-top:7px;padding:4px 7px;border-radius:999px;background:var(--accent2);color:var(--accent);font-size:11px;font-weight:800}.actions{display:flex;gap:5px;margin-top:auto;padding-top:9px}.actions button{flex:1;padding:8px 5px;font-size:11px}.empty{grid-column:1/-1;padding:40px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px}
    dialog{border:0;padding:0;width:min(520px,calc(100% - 20px));max-height:90dvh;border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.3)}dialog::backdrop{background:rgba(25,20,16,.55)}.modal{padding:18px;overflow:auto;max-height:90dvh}.modal-head{display:flex;align-items:center;justify-content:space-between}.modal h2{margin:0}.modal label{display:block;font-size:13px;font-weight:800;margin:12px 0 6px}.row{display:flex;gap:8px}.toast{position:fixed;left:50%;bottom:calc(22px + var(--safe-bottom));transform:translateX(-50%) translateY(15px);background:#24211e;color:#fff;padding:11px 14px;border-radius:12px;opacity:0;transition:.2s;pointer-events:none;z-index:50;max-width:calc(100% - 32px);text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .scanner{position:fixed;inset:0;background:#050505;z-index:100;display:none}.scanner.open{display:block}#readerLive{position:absolute;inset:0;overflow:hidden}#readerLive video{width:100%!important;height:100%!important;object-fit:cover!important}.scanner-ui{position:absolute;inset:0;padding:calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(rgba(0,0,0,.45),transparent 25%,transparent 65%,rgba(0,0,0,.65))}.scanner-top{display:flex;justify-content:space-between;gap:8px}.round{background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.35);backdrop-filter:blur(8px)}.scan-frame{position:absolute;left:8%;right:8%;top:36%;height:150px;border:3px solid #fff;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.25)}.scan-line{position:absolute;left:5%;right:5%;height:2px;background:#fff;top:50%;animation:scan 1.8s infinite ease-in-out}@keyframes scan{0%,100%{transform:translateY(-55px)}50%{transform:translateY(55px)}}.scanner-bottom{text-align:center;color:#fff}.scanner-bottom p{margin:0 0 12px;font-size:14px}.scanner-actions{display:flex;gap:8px}.scanner-actions button{flex:1}.camera-select{max-width:190px;background:rgba(0,0,0,.55);color:#fff;border-color:rgba(255,255,255,.35)}#readerHidden{position:fixed;left:-9999px;width:640px;height:480px}.install{display:none}.install.show{display:block;width:100%;margin-top:8px}
    @media(min-width:620px){.books{grid-template-columns:repeat(3,minmax(0,1fr))}.toolbar{grid-template-columns:1fr 160px auto}.toolbar select{grid-column:auto}}
  </style>
</head>
<body>
<main class="app">
  <header><div><h1>나의 서재</h1><div class="sub">책 뒤의 ISBN을 비추면 자동으로 등록합니다.</div></div><div class="count"><strong id="bookCount">0</strong>권</div></header>
  <section class="card hero">
    <h2>책 등록</h2>
    <button id="openScanner" class="scan-button">📷 ISBN 바코드 스캔</button>
    <button id="installBtn" class="secondary install">홈 화면에 앱 설치</button>
    <div class="manual-row"><input id="isbnInput" inputmode="numeric" autocomplete="off" placeholder="또는 ISBN 10/13자리 입력"><button id="lookupBtn" class="primary">책 찾기</button></div>
    <p id="lookupStatus" class="status">ISBN을 입력하거나 카메라로 스캔하세요.</p>
  </section>
  <section class="card">
    <div class="toolbar"><input id="searchInput" placeholder="제목, 저자, ISBN, 노트 검색"><select id="filterStatus"><option value="">모든 상태</option><option>읽고 싶은 책</option><option>읽는 중</option><option>완독</option><option>중단</option></select><button id="manualBtn" class="secondary">직접 등록</button></div>
    <div id="bookList" class="books"></div>
  </section>
</main>

<section id="scannerView" class="scanner" aria-hidden="true">
  <div id="readerLive"></div>
  <div class="scan-frame"><div class="scan-line"></div></div>
  <div class="scanner-ui">
    <div class="scanner-top"><button id="closeScanner" class="round">✕ 닫기</button><button id="switchCamera" class="round">🔄 전·후면 전환</button></div>
    <div class="scanner-bottom"><p id="cameraStatus">후면 카메라를 준비하고 있습니다…</p><div class="scanner-actions"><button id="torchBtn" class="round">🔦 플래시</button><button id="photoBtn" class="round">🖼 사진으로 찾기</button></div></div>
  </div>
</section>
<input id="photoInput" type="file" accept="image/*" capture="environment" hidden>
<div id="readerHidden"></div>

<dialog id="bookDialog"><form method="dialog" class="modal" id="bookForm"><div class="modal-head"><h2 id="dialogTitle">책 등록</h2><button value="cancel" class="ghost">✕</button></div><input type="hidden" id="editId"><label>ISBN</label><input id="formIsbn"><label>제목 *</label><input id="formTitle" required><label>저자</label><input id="formAuthor"><label>출판사</label><input id="formPublisher"><label>표지 이미지 URL</label><input id="formCover"><div class="row"><div style="flex:1"><label>독서 상태</label><select id="formStatus"><option>읽고 싶은 책</option><option>읽는 중</option><option>완독</option><option>중단</option></select></div><div style="flex:1"><label>분류</label><input id="formCategory" placeholder="소설, 인문, 기술…"></div></div><label>노트 / 북리뷰</label><textarea id="formNote" placeholder="인상 깊은 문장, 생각, 한줄평을 기록하세요."></textarea><div class="row" style="margin-top:16px"><button value="cancel" class="ghost">취소</button><button id="saveBtn" value="default" class="primary" style="flex:1">서재에 저장</button></div></form></dialog>
<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY='my-isbn-library-mobile-v1';
let books=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let liveQr=null, scanning=false, torchOn=false, deferredPrompt=null;
let currentFacing='environment';

async function stopCamera(){
  scanning=false;
  torchOn=false;
  if(liveQr){
    try{await liveQr.stop()}catch(e){}
    try{await liveQr.clear()}catch(e){}
    liveQr=null;
  }
  $('#readerLive').innerHTML='';
  $('#torchBtn').textContent='🔦 플래시';
}

async function startCamera(facing=currentFacing){
  await stopCamera();
  if(typeof Html5Qrcode==='undefined') throw new Error('ScannerModuleUnavailable');

  currentFacing=facing;
  liveQr=new Html5Qrcode('readerLive', {
    verbose:false,
    experimentalFeatures:{useBarCodeDetectorIfSupported:false}
  });

  const config={
    fps:15,
    disableFlip:false,
    formatsToSupport:[
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128
    ],
    videoConstraints:{
      facingMode:{ideal:facing},
      width:{ideal:1920},
      height:{ideal:1080}
    }
  };

  await liveQr.start(
    {facingMode:{ideal:facing}},
    config,
    async decodedText=>{
      const digits=String(decodedText||'').replace(/\D/g,'');
      const isbn=normalizeIsbn(digits);
      if(!validIsbn(isbn)||!scanning) return;
      scanning=false;
      navigator.vibrate?.(120);
      await closeScanner();
      lookupIsbn(isbn);
    },
    ()=>{}
  );

  scanning=true;
  $('#cameraStatus').textContent =
    facing==='environment'
      ? '후면 카메라 사용 중 · 978/979 바코드를 화면 가득 크게 맞추세요.'
      : '전면 카메라 사용 중 · 전환 버튼을 눌러 후면 카메라를 사용하세요.';
}

async function openScanner(){
  if(!window.isSecureContext){
    toast('HTTPS 주소에서 접속해야 카메라를 사용할 수 있습니다.');
    return;
  }
  if(typeof Html5Qrcode==='undefined'){
    toast('바코드 모듈을 불러오지 못했습니다. 인터넷 연결을 확인하세요.');
    return;
  }
  $('#scannerView').classList.add('open');
  $('#scannerView').setAttribute('aria-hidden','false');
  $('#cameraStatus').textContent='후면 카메라를 준비하고 있습니다…';
  try{
    await startCamera('environment');
  }catch(e){
    console.error(e);
    $('#cameraStatus').textContent='후면 카메라를 열지 못했습니다. 전·후면 전환을 눌러 다시 시도하세요.';
    toast(`${e.name||'CameraError'}: 카메라를 시작하지 못했습니다.`);
  }
}

async function closeScanner(){
  await stopCamera();
  $('#scannerView').classList.remove('open');
  $('#scannerView').setAttribute('aria-hidden','true');
}

$('#openScanner').onclick=openScanner;
$('#closeScanner').onclick=closeScanner;
$('#switchCamera').onclick=async()=>{
  const next=currentFacing==='environment'?'user':'environment';
  $('#cameraStatus').textContent=next==='environment'?'후면 카메라로 전환 중…':'전면 카메라로 전환 중…';
  try{
    await startCamera(next);
  }catch(err){
    console.error(err);
    toast('카메라 전환에 실패했습니다.');
  }
};

$('#torchBtn').onclick=async()=>{
  try{
    if(!liveQr) throw new Error();
    torchOn=!torchOn;
    await liveQr.applyVideoConstraints({advanced:[{torch:torchOn}]});
    $('#torchBtn').textContent=torchOn?'🔦 플래시 끄기':'🔦 플래시';
  }catch(e){
    torchOn=false;
    toast('이 iPhone/Safari에서는 플래시 제어가 지원되지 않을 수 있습니다.');
  }
};
$('#photoBtn').onclick=()=>$('#photoInput').click();$('#photoInput').onchange=async e=>{const file=e.target.files?.[0];if(!file)return;if(typeof Html5Qrcode==='undefined'){toast('사진 인식 모듈을 불러오지 못했습니다. 인터넷 연결을 확인하세요.');return}try{const qr=new Html5Qrcode('readerHidden');const text=await qr.scanFile(file,true);await qr.clear();const isbn=normalizeIsbn(text);if(!validIsbn(isbn))throw new Error();await closeScanner();lookupIsbn(isbn)}catch(err){toast('사진에서 ISBN 바코드를 찾지 못했습니다.')}};
$('#lookupBtn').onclick=()=>lookupIsbn($('#isbnInput').value);$('#isbnInput').addEventListener('keydown',e=>{if(e.key==='Enter')lookupIsbn(e.target.value)});$('#manualBtn').onclick=()=>openForm({status:'읽고 싶은 책'});$('#searchInput').oninput=render;$('#filterStatus').onchange=render;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('#installBtn').classList.add('show')});$('#installBtn').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;$('#installBtn').classList.remove('show')};
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.warn));
render();
</script>
</body>
</html>
