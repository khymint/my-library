<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#5f4b3b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="나의 서재" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>나의 서재 · 모바일 ISBN 스캐너</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{--bg:#f7f3ed;--panel:#fffdf9;--ink:#2d2925;--muted:#77706a;--line:#e7ddd1;--accent:#72533d;--accent2:#efe3d5;--danger:#a23b3b;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif} button,input,select,textarea{font:inherit}.app{max-width:720px;margin:auto;padding:calc(18px + var(--safe-top)) 16px calc(92px + var(--safe-bottom))}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}h1{margin:0;font-family:Georgia,serif;font-size:34px}.sub{font-size:13px;color:var(--muted);margin-top:4px}.count{background:var(--ink);color:#fff;border-radius:16px;padding:10px 15px;text-align:center}.count strong{display:block;font-size:22px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(70,48,31,.06);margin-bottom:14px}h2{font-size:18px;margin:0 0 12px}.hero{display:grid;gap:10px}.scan-button{width:100%;min-height:58px;border:0;border-radius:16px;background:var(--accent);color:#fff;font-weight:800;font-size:17px}.manual-row{display:flex;gap:8px}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px;color:var(--ink)}button{border:0;border-radius:13px;padding:12px 14px;font-weight:800}.primary{background:var(--accent);color:white}.secondary{background:var(--accent2);color:var(--accent)}.ghost{background:transparent;border:1px solid var(--line)}.danger{background:#faeded;color:var(--danger)}.hint,.status{color:var(--muted);font-size:13px;line-height:1.45;margin:8px 0 0}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}.toolbar select{grid-column:1/-1}.books{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.book{border:1px solid var(--line);background:white;border-radius:17px;padding:10px;display:flex;flex-direction:column;min-height:300px}.cover{width:100%;aspect-ratio:3/4;object-fit:cover;background:#eee6dc;border-radius:11px}.cover-placeholder{display:grid;place-items:center;text-align:center;padding:8px;color:var(--muted)}.book h3{font-size:15px;line-height:1.35;margin:9px 0 4px}.meta{font-size:12px;line-height:1.4;color:var(--muted)}.badge{display:inline-flex;width:max-content;margin-top:7px;padding:4px 7px;border-radius:999px;background:var(--accent2);color:var(--accent);font-size:11px;font-weight:800}.actions{display:flex;gap:5px;margin-top:auto;padding-top:9px}.actions button{flex:1;padding:8px 5px;font-size:11px}.empty{grid-column:1/-1;padding:40px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px}
    dialog{border:0;padding:0;width:min(520px,calc(100% - 20px));max-height:90dvh;border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.3)}dialog::backdrop{background:rgba(25,20,16,.55)}.modal{padding:18px;overflow:auto;max-height:90dvh}.modal-head{display:flex;align-items:center;justify-content:space-between}.modal h2{margin:0}.modal label{display:block;font-size:13px;font-weight:800;margin:12px 0 6px}.row{display:flex;gap:8px}.toast{position:fixed;left:50%;bottom:calc(22px + var(--safe-bottom));transform:translateX(-50%) translateY(15px);background:#24211e;color:#fff;padding:11px 14px;border-radius:12px;opacity:0;transition:.2s;pointer-events:none;z-index:50;max-width:calc(100% - 32px);text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .scanner{position:fixed;inset:0;background:#050505;z-index:100;display:none}.scanner.open{display:block}.scanner video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.scanner-ui{position:absolute;inset:0;padding:calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(rgba(0,0,0,.45),transparent 25%,transparent 65%,rgba(0,0,0,.65))}.scanner-top{display:flex;justify-content:space-between;gap:8px}.round{background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.35);backdrop-filter:blur(8px)}.scan-frame{position:absolute;left:8%;right:8%;top:36%;height:150px;border:3px solid #fff;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.25)}.scan-line{position:absolute;left:5%;right:5%;height:2px;background:#fff;top:50%;animation:scan 1.8s infinite ease-in-out}@keyframes scan{0%,100%{transform:translateY(-55px)}50%{transform:translateY(55px)}}.scanner-bottom{text-align:center;color:#fff}.scanner-bottom p{margin:0 0 12px;font-size:14px}.scanner-actions{display:flex;gap:8px}.scanner-actions button{flex:1}.camera-select{max-width:190px;background:rgba(0,0,0,.55);color:#fff;border-color:rgba(255,255,255,.35)}#readerHidden{position:fixed;left:-9999px;width:640px;height:480px}.install{display:none}.install.show{display:block;width:100%;margin-top:8px}
    @media(min-width:620px){.books{grid-template-columns:repeat(3,minmax(0,1fr))}.toolbar{grid-template-columns:1fr 160px auto}.toolbar select{grid-column:auto}}
  </style>
</head>
<body>
<main class="app">
  <header><div><h1>나의 서재</h1><div class="sub">책 뒤의 ISBN을 비추면 자동으로 등록합니다.</div></div><div class="count"><strong id="bookCount">0</strong>권</div></header>
  <section class="card hero">
    <h2>책 등록</h2>
    <button id="openScanner" class="scan-button">📷 ISBN 바코드 스캔</button>
    <button id="installBtn" class="secondary install">홈 화면에 앱 설치</button>
    <div class="manual-row"><input id="isbnInput" inputmode="numeric" autocomplete="off" placeholder="또는 ISBN 10/13자리 입력"><button id="lookupBtn" class="primary">책 찾기</button></div>
    <p id="lookupStatus" class="status">ISBN을 입력하거나 카메라로 스캔하세요.</p>
  </section>
  <section class="card">
    <div class="toolbar"><input id="searchInput" placeholder="제목, 저자, ISBN, 노트 검색"><select id="filterStatus"><option value="">모든 상태</option><option>읽고 싶은 책</option><option>읽는 중</option><option>완독</option><option>중단</option></select><button id="manualBtn" class="secondary">직접 등록</button></div>
    <div id="bookList" class="books"></div>
  </section>
</main>

<section id="scannerView" class="scanner" aria-hidden="true">
  <video id="cameraVideo" playsinline muted></video>
  <div class="scan-frame"><div class="scan-line"></div></div>
  <div class="scanner-ui">
    <div class="scanner-top"><button id="closeScanner" class="round">✕ 닫기</button><select id="cameraSelect" class="camera-select"></select></div>
    <div class="scanner-bottom"><p id="cameraStatus">후면 카메라를 준비하고 있습니다…</p><div class="scanner-actions"><button id="torchBtn" class="round">🔦 플래시</button><button id="photoBtn" class="round">🖼 사진으로 찾기</button></div></div>
  </div>
</section>
<input id="photoInput" type="file" accept="image/*" capture="environment" hidden>
<div id="readerHidden"></div>

<dialog id="bookDialog"><form method="dialog" class="modal" id="bookForm"><div class="modal-head"><h2 id="dialogTitle">책 등록</h2><button value="cancel" class="ghost">✕</button></div><input type="hidden" id="editId"><label>ISBN</label><input id="formIsbn"><label>제목 *</label><input id="formTitle" required><label>저자</label><input id="formAuthor"><label>출판사</label><input id="formPublisher"><label>표지 이미지 URL</label><input id="formCover"><div class="row"><div style="flex:1"><label>독서 상태</label><select id="formStatus"><option>읽고 싶은 책</option><option>읽는 중</option><option>완독</option><option>중단</option></select></div><div style="flex:1"><label>분류</label><input id="formCategory" placeholder="소설, 인문, 기술…"></div></div><label>노트 / 북리뷰</label><textarea id="formNote" placeholder="인상 깊은 문장, 생각, 한줄평을 기록하세요."></textarea><div class="row" style="margin-top:16px"><button value="cancel" class="ghost">취소</button><button id="saveBtn" value="default" class="primary" style="flex:1">서재에 저장</button></div></form></dialog>
<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY='my-isbn-library-mobile-v1';
let books=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let stream=null, detector=null, scanning=false, rafId=null, torchOn=false, deferredPrompt=null;
const $=s=>document.querySelector(s);
const toast=m=>{const e=$('#toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2400)};
const normalizeIsbn=v=>(v||'').replace(/[^0-9Xx]/g,'').toUpperCase();
const validIsbn=v=>/^(\d{13}|\d{9}[\dX])$/.test(normalizeIsbn(v));
const esc=v=>String(v||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(books));render()}
function render(){const q=$('#searchInput').value.trim().toLowerCase(),st=$('#filterStatus').value;const f=books.filter(b=>(!st||b.status===st)&&(!q||[b.title,b.author,b.isbn,b.note,b.category].join(' ').toLowerCase().includes(q)));$('#bookCount').textContent=books.length;$('#bookList').innerHTML=f.length?f.map(b=>`<article class="book">${b.cover?`<img class="cover" src="${esc(b.cover)}" alt="${esc(b.title)} 표지" onerror="this.outerHTML='<div class=&quot;cover cover-placeholder&quot;>표지 없음</div>'">`:`<div class="cover cover-placeholder">${esc(b.title)}</div>`}<h3>${esc(b.title)}</h3><div class="meta">${esc(b.author||'저자 미상')}<br>${esc(b.publisher||'')}</div><span class="badge">${esc(b.status)}</span><div class="actions"><button class="secondary" onclick="editBook('${b.id}')">노트/수정</button><button class="danger" onclick="removeBook('${b.id}')">삭제</button></div></article>`).join(''):`<div class="empty">등록된 책이 없습니다.<br>ISBN 바코드를 스캔해 첫 책을 추가해보세요.</div>`}
function openForm(b={}){$('#dialogTitle').textContent=b.id?'책 정보 및 노트 수정':'책 등록';$('#editId').value=b.id||'';$('#formIsbn').value=b.isbn||'';$('#formTitle').value=b.title||'';$('#formAuthor').value=b.author||'';$('#formPublisher').value=b.publisher||'';$('#formCover').value=b.cover||'';$('#formStatus').value=b.status||'읽고 싶은 책';$('#formCategory').value=b.category||'';$('#formNote').value=b.note||'';$('#bookDialog').showModal()}
window.editBook=id=>openForm(books.find(b=>b.id===id));window.removeBook=id=>{if(confirm('이 책과 노트를 삭제할까요?')){books=books.filter(b=>b.id!==id);save()}};
$('#bookForm').addEventListener('submit',e=>{e.preventDefault();const id=$('#editId').value;const b={id:id||crypto.randomUUID(),isbn:normalizeIsbn($('#formIsbn').value),title:$('#formTitle').value.trim(),author:$('#formAuthor').value.trim(),publisher:$('#formPublisher').value.trim(),cover:$('#formCover').value.trim(),status:$('#formStatus').value,category:$('#formCategory').value.trim(),note:$('#formNote').value.trim(),updatedAt:new Date().toISOString()};if(!b.title){toast('제목을 입력해 주세요.');return}if(id)books=books.map(x=>x.id===id?b:x);else books.unshift(b);save();$('#bookDialog').close();toast(id?'수정했습니다.':'서재에 등록했습니다.')});
const cover=u=>(u||'').replace(/^http:/,'https:');
async function openLibrary(isbn){const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);if(!r.ok)return null;const d=await r.json(),x=d[`ISBN:${isbn}`];if(!x)return null;return{isbn,title:x.title||'',author:(x.authors||[]).map(a=>a.name).join(', '),publisher:(x.publishers||[]).map(p=>p.name).join(', '),cover:cover(x.cover?.large||x.cover?.medium||x.cover?.small),category:(x.subjects||[]).slice(0,2).map(v=>v.name||v).join(', ')}}
async function googleBooks(isbn){const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&maxResults=5`);if(!r.ok)return null;const d=await r.json(),item=(d.items||[]).find(i=>(i.volumeInfo?.industryIdentifiers||[]).some(v=>normalizeIsbn(v.identifier)===isbn))||d.items?.[0];if(!item)return null;const x=item.volumeInfo||{};return{isbn,title:[x.title,x.subtitle].filter(Boolean).join(' — '),author:(x.authors||[]).join(', '),publisher:x.publisher||'',cover:cover(x.imageLinks?.large||x.imageLinks?.medium||x.imageLinks?.thumbnail),category:(x.categories||[]).slice(0,2).join(', ')}}
async function lookupIsbn(raw){const isbn=normalizeIsbn(raw);if(!validIsbn(isbn)){toast('올바른 ISBN을 입력해 주세요.');return}$('#isbnInput').value=isbn;if(books.some(b=>b.isbn===isbn)){toast('이미 등록된 책입니다.');return}$('#lookupBtn').disabled=true;$('#lookupStatus').textContent=`ISBN ${isbn} 검색 중…`;try{let b=await openLibrary(isbn);if(!b)b=await googleBooks(isbn);if(b){openForm({...b,status:'읽고 싶은 책',note:''});$('#lookupStatus').textContent=`“${b.title}” 정보를 찾았습니다.`;toast('책 정보를 찾았습니다.')}else{openForm({isbn,status:'읽고 싶은 책'});$('#lookupStatus').textContent='책 정보를 찾지 못해 직접 입력 화면을 열었습니다.'}}catch(e){console.error(e);openForm({isbn,status:'읽고 싶은 책'});$('#lookupStatus').textContent='온라인 조회에 실패했습니다. 인터넷 연결을 확인하세요.'}finally{$('#lookupBtn').disabled=false}}
async function enumerateCameras(){try{const devices=await navigator.mediaDevices.enumerateDevices();const cams=devices.filter(d=>d.kind==='videoinput');$('#cameraSelect').innerHTML=cams.map((c,i)=>`<option value="${c.deviceId}">${esc(c.label||`카메라 ${i+1}`)}</option>`).join('');const rear=cams.find(c=>/back|rear|environment|후면/i.test(c.label));if(rear)$('#cameraSelect').value=rear.deviceId}catch(e){console.warn(e)}}
async function stopCamera(){scanning=false;if(rafId)cancelAnimationFrame(rafId);rafId=null;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}$('#cameraVideo').srcObject=null;torchOn=false}
async function startCamera(deviceId=''){await stopCamera();const constraints={audio:false,video:deviceId?{deviceId:{exact:deviceId},width:{ideal:1920},height:{ideal:1080}}:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}};stream=await navigator.mediaDevices.getUserMedia(constraints);const video=$('#cameraVideo');video.srcObject=stream;await video.play();await enumerateCameras();const current=stream.getVideoTracks()[0].getSettings().deviceId;if(current)$('#cameraSelect').value=current;scanning=true;$('#cameraStatus').textContent='책 뒤의 978 또는 979 바코드를 사각형 안에 맞추세요.';scanLoop()}
async function scanLoop(){if(!scanning)return;try{if('BarcodeDetector'in window){if(!detector)detector=new BarcodeDetector({formats:['ean_13']});const codes=await detector.detect($('#cameraVideo'));if(codes.length){const isbn=normalizeIsbn(codes[0].rawValue);if(validIsbn(isbn)){navigator.vibrate?.(120);await closeScanner();lookupIsbn(isbn);return}}}}catch(e){console.warn(e)}rafId=requestAnimationFrame(scanLoop)}
async function openScanner(){if(!window.isSecureContext){toast('스마트폰에서는 HTTPS 주소로 접속해야 카메라를 사용할 수 있습니다.');return}if(!navigator.mediaDevices?.getUserMedia){toast('이 브라우저는 카메라를 지원하지 않습니다.');return}$('#scannerView').classList.add('open');$('#scannerView').setAttribute('aria-hidden','false');try{await startCamera()}catch(e){console.error(e);$('#cameraStatus').textContent='카메라를 열지 못했습니다. 다른 앱의 카메라 사용을 종료하거나 아래에서 카메라를 바꿔보세요.';toast(`${e.name||'CameraError'}: 카메라를 시작하지 못했습니다.`);await enumerateCameras()}}
async function closeScanner(){await stopCamera();$('#scannerView').classList.remove('open');$('#scannerView').setAttribute('aria-hidden','true')}
$('#openScanner').onclick=openScanner;$('#closeScanner').onclick=closeScanner;$('#cameraSelect').onchange=async e=>{try{await startCamera(e.target.value)}catch(err){toast('선택한 카메라를 시작하지 못했습니다.')}};
$('#torchBtn').onclick=async()=>{const track=stream?.getVideoTracks()[0];const caps=track?.getCapabilities?.();if(!caps?.torch){toast('이 기기는 플래시 제어를 지원하지 않습니다.');return}torchOn=!torchOn;await track.applyConstraints({advanced:[{torch:torchOn}]});$('#torchBtn').textContent=torchOn?'🔦 플래시 끄기':'🔦 플래시'};
$('#photoBtn').onclick=()=>$('#photoInput').click();$('#photoInput').onchange=async e=>{const file=e.target.files?.[0];if(!file)return;if(typeof Html5Qrcode==='undefined'){toast('사진 인식 모듈을 불러오지 못했습니다. 인터넷 연결을 확인하세요.');return}try{const qr=new Html5Qrcode('readerHidden');const text=await qr.scanFile(file,true);await qr.clear();const isbn=normalizeIsbn(text);if(!validIsbn(isbn))throw new Error();await closeScanner();lookupIsbn(isbn)}catch(err){toast('사진에서 ISBN 바코드를 찾지 못했습니다.')}};
$('#lookupBtn').onclick=()=>lookupIsbn($('#isbnInput').value);$('#isbnInput').addEventListener('keydown',e=>{if(e.key==='Enter')lookupIsbn(e.target.value)});$('#manualBtn').onclick=()=>openForm({status:'읽고 싶은 책'});$('#searchInput').oninput=render;$('#filterStatus').onchange=render;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('#installBtn').classList.add('show')});$('#installBtn').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;$('#installBtn').classList.remove('show')};
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.warn));
render();
</script>
</body>
</html>
